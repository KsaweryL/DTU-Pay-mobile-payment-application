services:
    rabbitmq:
        image: rabbitmq:management
        container_name: rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            # Allow guest connections from other containers (dev-friendly).
            - RABBITMQ_DEFAULT_USER=guest
            - RABBITMQ_DEFAULT_PASS=guest
            - RABBITMQ_LOOPBACK_USERS=none
        healthcheck:
            test: rabbitmq-diagnostics check_port_connectivity
            interval: 3s
            timeout: 3s
            retries: 30
        
    payment-manager:
        build:
            context: ./services/payment-manager
            dockerfile: Dockerfile
        container_name: payment-manager
        environment:
            - RABBITMQ_HOST=rabbitmq
            - RABBITMQ_PORT=5672
            - RABBITMQ_USER=guest
            - RABBITMQ_PASS=guest
            - JAVA_TOOL_OPTIONS=-javaagent:/opt/jacocoagent.jar=destfile=/jacoco/jacoco.exec,append=true,output=file
        volumes:
            - ./services/payment-manager/target:/jacoco
        depends_on:
            rabbitmq:
                condition: service_healthy

    account-manager:
